<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{site_title}}</title>
  <link rel="stylesheet" href="/static/style.css">
  <link rel="webmention" href="https://webmention.io/yoursite.com/webmention">
  <link rel="me" href="https://mastodon.social/@you">
  <link rel="authorization_endpoint" href="https://indieauth.com/auth">
  <link rel="alternate" type="application/rss+xml" title="{{site_title}}" href="/feed.xml">
</head>
<body>

  <header class="h-card site-header">
    <a class="u-url p-name" href="{{site_url}}" rel="me">{{author}}</a>
    <p class="p-note">{{bio}}</p>
  </header>

  <main>
    {{posts}}
  </main>

  <footer>
    <a href="/feed.xml">RSS Feed</a>
  </footer>

</body>
</html>
