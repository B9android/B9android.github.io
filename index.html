<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>My Deadlock Statistics</title>
        <style>

        </style>
    </head>
    <body>
        <h1>My Deadlock Statistics</h1>
        <div id="loading" class="loading">Loading stats...</div>
        <div id="error" class="error" style="display: none;"></div>


        <div id="quick-stats"></div>

        <script src="deadlock-stats.js"></script>
        <script>
            const ACCOUNT_ID = '105130498';

            DeadlockStats.fetch(ACCOUNT_ID).then(stats => {
                if (!stats) return;
                document.getElementById('quick-stats').innerHTML = `
                    <p>${stats.wins}W - ${stats.losses}L (${stats.winRate}% WR) | ${stats.kda} KDA</p>
                `;
            });
        </script>
    </body>
</html>
